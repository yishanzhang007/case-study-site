<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yishan Zhang — Case Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Denim INK';
      src: url('assets/DenimINK-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'iA Writer Mono';
      src: url('assets/iAWriterMonoS-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ease-out-quint: cubic-bezier(0.23, 1, 0.32, 1);
      --bg: #fcfcfb;
      --fg-primary: #21201d;
      --fg-secondary: #666561;
      --fg-muted: #82807c;
      --border: #dad9d6;
      --surface-secondary: #f8f8f7;
      --neutral-4: #e9e8e6;
      --selected: #6a3cdf;
      --link: #1576b6;
      --card-border: 0.75px solid rgba(0, 0, 0, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle, #c8c7c4 0.9px, transparent 0.9px);
      background-size: 20px 20px;
      background-attachment: fixed;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Soft vignette overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      box-shadow: inset 0 0 200px 60px rgba(0,0,0,0.06);
      pointer-events: none;
      z-index: 9999;
    }

    .scene {
      width: 1440px;
      /* height set dynamically by JS */
      position: relative;
      overflow: visible;
      /* transform-origin set by JS */
    }

    /* ============ PHYSICAL OBJECT SHADOWS (low-angle light from top-left, long streak) ============ */
    .deco-shadow {
      filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.22))
              drop-shadow(7px 7px 1px rgba(0,0,0,0.16))
              drop-shadow(14px 14px 2px rgba(0,0,0,0.12))
              drop-shadow(24px 24px 3px rgba(0,0,0,0.08))
              drop-shadow(38px 38px 5px rgba(0,0,0,0.05))
              drop-shadow(56px 56px 8px rgba(0,0,0,0.03));
    }

    /* ============ HIGH-RES SVG RENDERING ============ */
    /* Render at 2x and scale back to 1x for crisp output under parent transform */
    .svg-crisp {
      image-rendering: optimizeQuality;
    }
    .svg-crisp-wrap {
      display: inline-block;
      overflow: hidden;
    }

    /* ============ ANIMATION KEYFRAMES ============ */
    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: var(--base-transform, none) scale(0.97) translateY(8px);
      }
      to {
        opacity: 1;
        transform: var(--base-transform, none) scale(1) translateY(0);
      }
    }

    @keyframes decoEnter {
      from {
        opacity: 0;
        transform: var(--base-transform, none) scale(0.95) rotate(var(--enter-twist, 3deg));
      }
      to {
        opacity: 1;
        transform: var(--base-transform, none) scale(1) rotate(0deg);
      }
    }

    .anim-card {
      opacity: 0;
      animation: cardEnter 280ms var(--ease-out-quint) forwards;
      will-change: transform, opacity;
    }

    .anim-deco {
      opacity: 0;
      animation: decoEnter 300ms var(--ease-out-quint) forwards;
      will-change: transform, opacity;
    }

    /* Stagger delays */
    .d1 { animation-delay: 0ms; }
    .d2 { animation-delay: 70ms; }
    .d3 { animation-delay: 140ms; }
    .d4 { animation-delay: 210ms; }
    .d5 { animation-delay: 280ms; }
    .d6 { animation-delay: 350ms; }
    .d7 { animation-delay: 420ms; }
    .d8 { animation-delay: 490ms; }
    .d9 { animation-delay: 560ms; }
    .d10 { animation-delay: 630ms; }
    .d11 { animation-delay: 700ms; }
    .d12 { animation-delay: 770ms; }
    .d13 { animation-delay: 840ms; }
    .d14 { animation-delay: 910ms; }
    .d15 { animation-delay: 980ms; }
    .d16 { animation-delay: 1050ms; }

    /* ============ REDUCED MOTION ============ */
    @media (prefers-reduced-motion: reduce) {
      .anim-card, .anim-deco {
        animation: none;
        opacity: 1;
      }
    }

    /* Responsive scaling handled by JS */

    /* ============ CENTER TEXT ============ */
    .center-text-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      padding: 0 16px;
    }

    .center-text {
      max-width: 640px;
      width: 100%;
      font-family: 'Denim INK', serif;
      font-size: 20px;
      line-height: 28px;
      color: var(--fg-primary);
      text-align: left;
    }

    @keyframes centerTextEnter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .center-text {
      opacity: 0;
      animation: centerTextEnter 280ms var(--ease-out-quint) 420ms forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .center-text {
        animation: none;
        opacity: 1;
      }
    }

    /* ============ CENTER NAV ============ */
    .center-nav {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      font-family: 'iA Writer Mono', monospace;
      font-size: 13px;
      letter-spacing: -0.05em;
    }

    .center-nav a {
      color: var(--fg-muted);
      text-decoration: none;
      pointer-events: auto;
      cursor: pointer;
      transition: opacity 150ms ease;
    }

    .center-nav a:hover {
      opacity: 0.5;
    }

    .center-nav a.active {
      color: #EF5E06;
    }

    /* ============ ELEMENT STYLES ============ */
    .positioned {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-base {
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.04);
      padding: 16px;
    }

    .visit-card {
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.85);
      border-radius: 12px;
      box-shadow: 0 0 2px rgba(0,0,0,0.35);
      padding: 12px;
      width: 311px;
    }

    .field-input {
      background: white;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 14px;
      color: var(--fg-primary);
      font-family: 'Inter', sans-serif;
      line-height: 18px;
    }

    .tab-active {
      color: var(--selected);
      font-weight: 500;
      border-bottom: 2px solid var(--selected);
      padding-bottom: 4px;
    }

    .tab-inactive {
      color: var(--fg-muted);
      font-weight: 500;
    }

    .toggle-track {
      width: 32px;
      height: 18px;
      border-radius: 999px;
      position: relative;
      flex-shrink: 0;
    }

    .toggle-on {
      background: var(--fg-primary);
    }

    .toggle-off {
      background: white;
      border: 1px solid var(--neutral-4);
    }

    .toggle-knob {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      position: absolute;
      top: 0;
    }

    .toggle-on .toggle-knob {
      right: 0;
      background: white;
      border: 1.3px solid var(--fg-primary);
    }

    .toggle-off .toggle-knob {
      left: 0;
      background: white;
      border: 1px solid var(--neutral-4);
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .deco-img {

    }

    }

      text-decoration: underline dotted;
    }

    .med-divider {
      width: 100%;
      height: 1px;
      background: var(--neutral-4);
      margin: 8px 0;
    }
  </style>
</head>

  <script>
    // Collect original left positions on init
    var spreadEls = [];
    var CENTER_X = 700;
    var BASE_WIDTH = 1440;

    (function initSpread() {
      var els = document.querySelectorAll('.scene > [class*="positioned"], .scene > [class*="deco-img"]');
      els.forEach(function(el) {
        var left = parseFloat(el.style.left);
        if (!isNaN(left)) {
          var isDeco = el.classList.contains('deco-img');
          spreadEls.push({ el: el, origLeft: left, isDeco: isDeco });
        }
      });
    })();

    function updateScene() {
      var scene = document.querySelector('.scene');
      var vw = window.innerWidth;
      var vh = window.innerHeight;

      var LEFT_PAD = 36;
      var CONTENT_WIDTH = 1550;

      // Spread factor: 0 at BASE_WIDTH, negative when narrower, positive when wider
      var spread = (vw - BASE_WIDTH) / BASE_WIDTH;

      // Apply horizontal spread to each element
      spreadEls.forEach(function(d) {
        var distFromCenter = d.origLeft - CENTER_X;
        var factor;
        if (d.isDeco) {
          // Physical objects: on narrow screens, pull INWARD toward center
          // so they stay visible. On wide screens, spread normally
          if (spread < 0) {
            factor = spread * 0.6; // pull toward center more aggressively
          } else {
            factor = spread * 0.35;
          }
        } else {
          factor = spread * 0.35;
        }
        var offset = distFromCenter * factor;
        d.el.style.left = (d.origLeft + offset) + 'px';
      });

      scene.style.height = vh + 'px';
      scene.style.top = '0';
      scene.style.transformOrigin = 'top left';
      scene.style.transform = 'none';
      scene.style.marginLeft = ((vw - CONTENT_WIDTH) / 2 + LEFT_PAD) + 'px';
    }

    updateScene();
    window.addEventListener('resize', updateScene);
  </script>
